name: univote_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.0
  flutter_tts: ^4.0.2
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0 # For PageView dot indicators
  geolocator: ^13.0.0
  firebase_messaging: ^15.0.0
  image_picker: ^1.1.2
  http: ^1.2.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/logo.png"
  min_sdk_android: 24
