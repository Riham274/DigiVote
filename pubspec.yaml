name: univote_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.0
  flutter_tts: ^4.0.2
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0 # For PageView dot indicators

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
